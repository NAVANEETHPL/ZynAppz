<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Hopper</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <nav class="bg-white border-b px-6 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <span class="font-bold text-gray-700">AI Free-Tier Router</span>
        </div>
        <input type="password" id="keyInput" placeholder="Paste OpenRouter Key" 
               class="text-xs border p-2 rounded w-48 focus:outline-none focus:ring-1 focus:ring-blue-400">
    </nav>

    <div id="chatArea" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="bg-blue-50 border border-blue-100 p-3 rounded-lg text-xs text-blue-700">
            <b>Strategy:</b> 1. Gemini (Free) → 2. Llama 3.3 (Free) → 3. Mistral (Free). 
            If one hits its daily limit, I switch instantly.
        </div>
    </div>

    <div class="p-4 bg-white border-t">
        <div class="max-w-3xl mx-auto flex gap-2">
            <input type="text" id="userInput" placeholder="Ask anything..." 
                   class="flex-1 border rounded-full px-5 py-3 outline-none focus:border-blue-500">
            <button id="sendBtn" class="bg-black text-white px-6 py-3 rounded-full hover:bg-gray-800 transition">
                Send
            </button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const keyInput = document.getElementById('keyInput');

        // PRESET MODELS (All are usually available in Free Tier via OpenRouter)
        const freeModels = [
            "google/gemini-2.5-flash:free",
            "meta-llama/llama-3.3-70b-instruct:free",
            "mistralai/mistral-7b-instruct:free",
            "openrouter/auto" // The final fallback
        ];

        // Load saved key
        keyInput.value = localStorage.getItem('ai_key') || '';
        keyInput.addEventListener('input', () => localStorage.setItem('ai_key', keyInput.value));

        async function sendMessage(text, modelIndex = 0) {
            if (modelIndex >= freeModels.length) {
                return "⚠️ Sorry, it looks like ALL free daily credits for all models have been used up.";
            }

            const currentModel = freeModels[modelIndex];
            addStatus(`Checking ${currentModel}...`);

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${keyInput.value}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": currentModel,
                        "messages": [{ "role": "user", "content": text }]
                    })
                });

                const data = await response.json();

                // CHECK FOR LIMITS (Error 429 is "Rate Limit", Error 402 is "Payment Needed")
                if (response.status === 429 || response.status === 402 || data.error) {
                    addStatus(`❌ ${currentModel} limit reached. Switching...`);
                    return await sendMessage(text, modelIndex + 1); // Jump to next model
                }

                return data.choices[0].message.content;
            } catch (err) {
                return await sendMessage(text, modelIndex + 1);
            }
        }

        function addStatus(txt) {
            const div = document.createElement('div');
            div.className = "text-[10px] text-gray-400 text-center italic py-1";
            div.innerText = txt;
            chatArea.appendChild(div);
        }

        function addBubble(role, text) {
            const div = document.createElement('div');
            div.className = `max-w-[80%] p-3 rounded-2xl ${role === 'user' ? 'bg-blue-600 text-white ml-auto' : 'bg-white border text-gray-800'}`;
            div.innerHTML = `<p class="text-sm">${text}</p>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        sendBtn.onclick = async () => {
            const val = userInput.value.trim();
            if (!val || !keyInput.value) return;
            
            addBubble('user', val);
            userInput.value = '';

            const reply = await sendMessage(val);
            addBubble('ai', reply);
        };
    </script>
</body>
</html>
